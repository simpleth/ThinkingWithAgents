name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest

      - name: Run Python tests
        run: python -m pytest .tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .web/package-lock.json

      - name: Install dependencies
        working-directory: .web
        run: npm ci

      - name: Run frontend tests
        working-directory: .web
        run: npm test

  build:
    needs: [python-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .web/package-lock.json

      - name: Generate data
        run: |
          python .readme/generate_index.py
          python .web/generate.py

      - name: Install frontend dependencies
        working-directory: .web
        run: npm ci

      - name: Build frontend
        working-directory: .web
        run: npm run build
